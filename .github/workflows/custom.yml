name: Custom Workflow

on:
  push:
    branches: [develop]

jobs:
  custom-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: ./sample-app

      - name: Run Tests
        run: npm test
        working-directory: ./sample-app
        

